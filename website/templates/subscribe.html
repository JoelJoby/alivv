<!-- subscribe part here -->
<section class="subscribe_part section_padding" id="subscribe_section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="subscribe_part_content">
                    <h2>Get promotions & updates!</h2>
                    <p>Seamlessly empower fully researched growth strategies and interoperable internal or “organic”
                        sources credibly innovate granular internal .</p>
                    <div class="subscribe_form">
                        <form action="{% url 'subscribe' %}" method="POST" style="display: flex; width: 100%;">
                            {% csrf_token %}
                            <input type="email" name="email" placeholder="Enter your mail" required
                                style="width: 100%;">
                            <button type="submit" class="btn_1"
                                style="border: none; cursor: pointer;">Subscribe</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- subscribe part end -->
